name: Update Job Database

on:
  schedule:
    - cron: '0 * * * *' # Runs exactly at the top of every hour
  workflow_dispatch: # Allows you to trigger it manually via a button

jobs:
  update-json:
    runs-on: ubuntu-latest

    # Add this new env block right here!
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Private Engine Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install gspread

      - name: Create Google Credentials File
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: echo "$GOOGLE_CREDENTIALS" > credentials.json

      - name: Run Export Script
        run: python export_script.py

      - name: Checkout Public Database Repo
        uses: actions/checkout@v4
        with:
          repository: 3kka/job-portal-database # CHANGE THIS TO YOUR PUBLIC REPO
          token: ${{ secrets.PAT_TOKEN }}
          path: public-data-folder

      - name: Move JSON and Push to Public Repo
        run: |
          cp offline_database.json public-data-folder/
          cd public-data-folder
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add offline_database.json
          git commit -m "Auto-update job database" || exit 0
          git push
