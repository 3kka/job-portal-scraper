name: Update Job Database

on:
  schedule:
    - cron: '* * * * *' # Runs every single minute for near real-time updates!
  workflow_dispatch:

jobs:
  update-json:
    runs-on: ubuntu-latest
    
    # Keeps the Node.js warning away
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install gspread

      - name: Create Google Credentials File
        # This securely pulls your hidden credentials
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: echo "$GOOGLE_CREDENTIALS" > credentials.json

      - name: Run Export Script
        run: python export_script.py

      - name: Save JSON to This Repository
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add offline_database.json
          git commit -m "Auto-update job database" || exit 0
          git push
